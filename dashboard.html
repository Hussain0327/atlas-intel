<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; }
  .header { padding: 24px 32px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header .ticker { background: #1f6feb; color: #fff; padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 14px; }
  .header .price { font-size: 32px; font-weight: 700; margin-left: auto; }
  .header .change { font-size: 14px; padding: 4px 8px; border-radius: 4px; margin-left: 8px; }
  .change.neg { background: #da3633; color: #fff; }
  .change.pos { background: #238636; color: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px 32px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
  .card.full { grid-column: 1 / -1; }
  .card h2 { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat { background: #0d1117; border-radius: 8px; padding: 12px; }
  .stat .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .stat .value.pos { color: #3fb950; }
  .stat .value.neg { color: #f85149; }
  .chart-container { position: relative; height: 300px; }
  .metrics-table { width: 100%; border-collapse: collapse; }
  .metrics-table td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  .metrics-table td:first-child { color: #8b949e; font-size: 13px; }
  .metrics-table td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .section-label { font-size: 12px; color: #1f6feb; font-weight: 600; padding: 12px 12px 4px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>

  <!-- Technical Indicators -->
  <div class="card">

function statCard(label, value, fmt) {
  const v = fmt === '%' ? value.toFixed(2) + '%' : fmt === '$' ? '$' + parseFloat(value).toFixed(2) : value;
  const cls = typeof value === 'number' && fmt === '%' ? (value >= 0 ? 'pos' : 'neg') : '';
  return `<div class="stat"><div class="label">${label}</div><div class="value ${cls}">${typeof value === 'number' && value >= 0 && fmt === '%' ? '+' : ''}${v}</div></div>`;
}

// Metrics tables
function metricRow(label, key, fmt) {
  let v = metrics[key];
  if (v == null) return '';
  v = parseFloat(v);
  if (fmt === '$') v = '$' + v.toFixed(2);
  else if (fmt === 'x') v = v.toFixed(2) + 'x';
  else if (fmt === '%') v = (v * 100).toFixed(2) + '%';
  else if (fmt === 'B') v = '$' + (v / 1e9).toFixed(1) + 'B';
  else if (fmt === 'd') v = v.toFixed(1) + ' days';
  else v = v.toFixed(2);
  return `<tr><td>${label}</td><td>${v}</td></tr>`;
}
