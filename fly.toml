app = "atlas-intel"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    GIT_SHA = ""

[deploy]
  release_command = "/app/.venv/bin/python -m alembic upgrade head"

[env]
  APP_ENV = "production"
  DISABLE_NLP = "true"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health/live"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/api/v1/health/ready"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
